name: CI

on:
  push:
    branches: ["DEV"]
  pull_request:
    branches: ["DEV", "QA", "UAT", "main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test -- --ci